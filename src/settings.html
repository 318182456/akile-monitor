<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akile 监控策略与通知配置</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(22, 28, 45, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --accent: #10b981;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #60a5fa, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-actions {
      display: flex;
      gap: 1rem;
    }
    
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.3);
    }
    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(59, 130, 246, 0.4);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }

    .container {
      max-width: 600px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      width: 100%;
      flex-grow: 1;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      color: white;
    }

    .form-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input, .form-group select {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 34px;
      border: 1px solid var(--border);
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--primary);
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(16, 185, 129, 0.9);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transform: translateY(150%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@simplewebauthn/browser@10.0.0/dist/bundle/index.umd.min.js"></script>
</head>
<body>
  <header>
    <h1>⚡ Akile 监控策略与通知配置</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="window.location.href='/'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>返回大厅</span>
      </button>
      <button class="btn btn-secondary" onclick="logout()" style="border-color: rgba(239, 68, 68, 0.4); color: #f87171;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        <span>退出登录</span>
      </button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title">监控策略与通道推送设置</div>
      <form id="settingsForm" onsubmit="saveSettings(event)">
        <div class="form-group">
          <label for="tgBotToken">Telegram Bot Token (非必填)</label>
          <input type="password" id="tgBotToken" placeholder="输入 TG 机器人 Token">
        </div>
        <div class="form-group">
          <label for="tgChatId">Telegram Chat ID (非必填)</label>
          <input type="text" id="tgChatId" placeholder="输入接收通知的 Chat ID">
        </div>
        <div class="form-group">
          <label for="wechatWebhook">企业微信群 Webhook URL (非必填)</label>
          <input type="password" id="wechatWebhook" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...">
        </div>
        <div class="form-group">
          <label for="maxPrice">通知价格上限 (CNY)</label>
          <input type="number" id="maxPrice" placeholder="如 20" required>
          <small style="display:block; margin-top:0.4rem; color:var(--text-muted); font-size:0.8rem; line-height:1.5;">
            通知触发条件：上架价 <strong>低于同规格历史均价</strong>（按 CPU/内存/硬盘/流量/节点/线路聚合）<strong>且</strong>不超过此上限。
            新规格无历史数据时不通知。
          </small>
        </div>
        <div class="form-group">
          <label>Akile 账户登录状态</label>
          <div style="background: rgba(0, 0, 0, 0.25); border: 1px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between;">
            <span id="akileLoginStatus" style="font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted);">
              <span id="akileLoginStatusDot" style="width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); display: inline-block;"></span>
              <span id="akileLoginStatusText">未检测到 Token</span>
            </span>
          </div>
        </div>
        <div class="form-group">
          <label for="akileEmail">Akile 账户邮箱 (用于自动登录刷新Token)</label>
          <input type="email" id="akileEmail" placeholder="318182456@qq.com">
        </div>
        <div class="form-group">
          <label for="akilePassword">Akile 账户密码</label>
          <input type="password" id="akilePassword" placeholder="输入密码">
        </div>
        <div class="form-group">
          <label for="akileTotpSecret">Akile TOTP 密钥 (如 FQJT...)</label>
          <input type="password" id="akileTotpSecret" placeholder="输入两步验证 TOTP Secret">
        </div>
        <div class="form-group switch-container">
          <label for="marketMonitor">监控二手交易市场 (Exchange)</label>
          <label class="switch">
            <input type="checkbox" id="marketMonitor">
            <span class="slider"></span>
          </label>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; justify-content: center;">保存配置</button>
      </form>
    </div>

    <!-- Passkey 管理模块 -->
    <div class="card" style="margin-top: 2rem;">
      <div class="card-title" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <span>🛡️ Passkey 安全设备管理</span>
        <button class="btn btn-secondary" onclick="registerPasskey()" style="padding: 0.5rem 1rem; font-size: 0.85rem; border-radius: 8px; gap: 0.25rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          <span>添加密钥</span>
        </button>
      </div>
      <div id="passkeyList" style="display: flex; flex-direction: column; gap: 1rem;">
        <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 1rem 0;">暂未绑定任何 Passkey 设备</p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">配置保存成功！</div>

  <script>
    const token = localStorage.getItem("admin_token") || "";
    if (!token) {
      window.location.href = `/login?redirect=${encodeURIComponent(window.location.pathname)}`;
    }

    async function apiFetch(url, options = {}) {
      options.headers = {
        ...options.headers,
        "Authorization": "Bearer " + token
      };
      const res = await fetch(url, options);
      if (res.status === 401) {
        localStorage.removeItem("admin_token");
        window.location.href = `/login?redirect=${encodeURIComponent(window.location.pathname)}`;
        throw new Error("Unauthorized");
      }
      return res;
    }

    function logout() {
      localStorage.removeItem("admin_token");
      document.cookie = "admin_token=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;";
      window.location.href = "/login";
    }

    let currentSettings = {};

    async function fetchSettings() {
      try {
        const res = await apiFetch("/api/settings");
        const settings = await res.json();
        currentSettings = settings;
        document.getElementById("tgBotToken").value = settings.tgBotToken || "";
        document.getElementById("tgChatId").value = settings.tgChatId || "";
        document.getElementById("maxPrice").value = settings.maxPrice || 20;
        document.getElementById("wechatWebhook").value = settings.wechatWebhook || "";
        document.getElementById("marketMonitor").checked = settings.marketMonitorEnabled;
        document.getElementById("akileEmail").value = settings.akileEmail || "";
        document.getElementById("akilePassword").value = settings.akilePassword || "";
        document.getElementById("akileTotpSecret").value = settings.akileTotpSecret || "";

        // 更新登录状态显示
        const statusDot = document.getElementById("akileLoginStatusDot");
        const statusText = document.getElementById("akileLoginStatusText");
        if (settings.akileAuthToken) {
          statusDot.style.background = "var(--accent)";
          statusText.innerText = "当前状态：已登录 (已获取 Token)";
          statusText.style.color = "var(--accent)";
        } else {
          statusDot.style.background = "var(--text-muted)";
          statusText.innerText = "当前状态：未登录 (请输入账户密码以自动登录)";
          statusText.style.color = "var(--text-muted)";
        }
      } catch (e) {
        console.error(e);
      }
    }

    async function saveSettings(e) {
      e.preventDefault();
      const tgBotToken = document.getElementById("tgBotToken").value;
      const tgChatId = document.getElementById("tgChatId").value;
      const wechatWebhook = document.getElementById("wechatWebhook").value;
      const maxPrice = parseFloat(document.getElementById("maxPrice").value);
      const marketMonitorEnabled = document.getElementById("marketMonitor").checked;
      const akileEmail = document.getElementById("akileEmail").value;
      const akilePassword = document.getElementById("akilePassword").value;
      const akileTotpSecret = document.getElementById("akileTotpSecret").value;

      if (!wechatWebhook && (!tgBotToken || !tgChatId)) {
        showToast("请至少完整填写 Telegram 推送或企业微信群 Webhook 之一！", true);
        return;
      }

      try {
        const res = await apiFetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            tgBotToken,
            tgChatId,
            maxPrice,
            wechatWebhook,
            marketMonitorEnabled,
            akileEmail,
            akilePassword,
            akileTotpSecret,
            akileAuthToken: currentSettings.akileAuthToken // 保持原有的 Token，防止被覆盖
          })
        });
        if (res.ok) {
          showToast("配置保存成功！");
          fetchSettings();
        }
      } catch (e) {
        showToast("配置保存失败，请检查网络", true);
      }
    }

    async function fetchPasskeys() {
      try {
        const res = await apiFetch("/api/auth/passkey/list");
        const list = await res.json();
        const listContainer = document.getElementById("passkeyList");
        if (list.length === 0) {
          listContainer.innerHTML = `<p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; padding: 1rem 0;">暂未绑定任何 Passkey 设备</p>`;
          return;
        }

        listContainer.innerHTML = list.map(item => `
          <div style="background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; display: flex; align-items: center; justify-content: space-between;">
            <div>
              <div style="font-weight: 600; font-size: 0.95rem; color: white;">${item.name}</div>
              <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">绑定时间: ${new Date(item.createdAt).toLocaleString()}</div>
            </div>
            <button class="btn btn-secondary" onclick="deletePasskey('${item.id}')" style="padding: 0.5rem 0.75rem; border-radius: 8px; border-color: rgba(239, 68, 68, 0.3); color: #f87171; font-size: 0.8rem;">
              删除
            </button>
          </div>
        `).join("");
      } catch (e) {
        console.error(e);
      }
    }

    async function registerPasskey() {
      try {
        const beginRes = await apiFetch("/api/auth/passkey/register/begin", { method: "POST" });
        const options = await beginRes.json();
        
        const response = await SimpleWebAuthnBrowser.startRegistration(options);
        
        const finishRes = await apiFetch("/api/auth/passkey/register/finish", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(response)
        });
        
        if (finishRes.ok) {
          showToast("Passkey 绑定成功！");
          fetchPasskeys();
        } else {
          const errData = await finishRes.json();
          showToast("绑定失败: " + (errData.error || "未知错误"), true);
        }
      } catch (e) {
        if (e.name !== "NotAllowedError") {
          showToast("Passkey 注册失败: " + e.message, true);
        }
      }
    }

    async function deletePasskey(id) {
      if (!confirm("确定要删除此 Passkey 吗？删除后将无法使用该设备登录。")) return;
      try {
        const res = await apiFetch(`/api/auth/passkey/delete/${id}`, { method: "DELETE" });
        if (res.ok) {
          showToast("Passkey 已成功删除");
          fetchPasskeys();
        }
      } catch (e) {
        showToast("删除失败，请检查网络", true);
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.style.background = isError ? "rgba(239, 68, 68, 0.9)" : "rgba(16, 185, 129, 0.9)";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    fetchSettings();
    fetchPasskeys();
  </script>
</body>
</html>
