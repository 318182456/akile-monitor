<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akile 监控策略与通知配置</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0f19;
      --card-bg: rgba(22, 28, 45, 0.7);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #3b82f6;
      --primary-hover: #60a5fa;
      --accent: #10b981;
      --text: #f3f4f6;
      --text-muted: #9ca3af;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
      background-attachment: fixed;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(to right, #60a5fa, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header-actions {
      display: flex;
      gap: 1rem;
    }
    
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.3);
    }
    .btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px 0 rgba(59, 130, 246, 0.4);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      box-shadow: none;
    }

    .container {
      max-width: 600px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      width: 100%;
      flex-grow: 1;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(16px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      color: white;
    }

    .form-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input, .form-group select {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: white;
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 48px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.1);
      transition: .4s;
      border-radius: 34px;
      border: 1px solid var(--border);
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: var(--primary);
    }
    input:checked + .slider:before {
      transform: translateX(24px);
    }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(16, 185, 129, 0.9);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transform: translateY(150%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }
    .toast.show {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Akile 监控策略与通知配置</h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="window.location.href='/'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        <span>返回大厅</span>
      </button>
    </div>
  </header>

  <div class="container">
    <div class="card">
      <div class="card-title">监控策略与通道推送设置</div>
      <form id="settingsForm" onsubmit="saveSettings(event)">
        <div class="form-group">
          <label for="tgBotToken">Telegram Bot Token (非必填)</label>
          <input type="password" id="tgBotToken" placeholder="输入 TG 机器人 Token">
        </div>
        <div class="form-group">
          <label for="tgChatId">Telegram Chat ID (非必填)</label>
          <input type="text" id="tgChatId" placeholder="输入接收通知的 Chat ID">
        </div>
        <div class="form-group">
          <label for="wechatWebhook">企业微信群 Webhook URL (非必填)</label>
          <input type="password" id="wechatWebhook" placeholder="https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...">
        </div>
        <div class="form-group">
          <label for="maxPrice">最大通知价格阈值 (JPY/CNY)</label>
          <input type="number" id="maxPrice" placeholder="如 20" required>
        </div>
        <div class="form-group">
          <label for="akileAuthToken">Akile Authorization Token</label>
          <input type="password" id="akileAuthToken" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpX...">
        </div>
        <div class="form-group switch-container">
          <label for="marketMonitor">监控二手交易市场 (Exchange)</label>
          <label class="switch">
            <input type="checkbox" id="marketMonitor">
            <span class="slider"></span>
          </label>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; justify-content: center;">保存配置</button>
      </form>
    </div>
  </div>

  <div class="toast" id="toast">配置保存成功！</div>

  <script>
    async function fetchSettings() {
      try {
        const res = await fetch("/api/settings");
        const settings = await res.json();
        document.getElementById("tgBotToken").value = settings.tgBotToken || "";
        document.getElementById("tgChatId").value = settings.tgChatId || "";
        document.getElementById("maxPrice").value = settings.maxPrice || 20;
        document.getElementById("akileAuthToken").value = settings.akileAuthToken || "";
        document.getElementById("wechatWebhook").value = settings.wechatWebhook || "";
        document.getElementById("marketMonitor").checked = settings.marketMonitorEnabled;
      } catch (e) {
        console.error(e);
      }
    }

    async function saveSettings(e) {
      e.preventDefault();
      const tgBotToken = document.getElementById("tgBotToken").value;
      const tgChatId = document.getElementById("tgChatId").value;
      const wechatWebhook = document.getElementById("wechatWebhook").value;
      const maxPrice = parseFloat(document.getElementById("maxPrice").value);
      const akileAuthToken = document.getElementById("akileAuthToken").value;
      const marketMonitorEnabled = document.getElementById("marketMonitor").checked;

      if (!wechatWebhook && (!tgBotToken || !tgChatId)) {
        showToast("请至少完整填写 Telegram 推送或企业微信群 Webhook 之一！", true);
        return;
      }

      try {
        const res = await fetch("/api/settings", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ tgBotToken, tgChatId, maxPrice, akileAuthToken, wechatWebhook, marketMonitorEnabled })
        });
        if (res.ok) {
          showToast("配置保存成功！");
        }
      } catch (e) {
        showToast("配置保存失败，请检查网络", true);
      }
    }

    function showToast(msg, isError = false) {
      const t = document.getElementById("toast");
      t.innerText = msg;
      t.style.background = isError ? "rgba(239, 68, 68, 0.9)" : "rgba(16, 185, 129, 0.9)";
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), 3000);
    }

    fetchSettings();
  </script>
</body>
</html>
